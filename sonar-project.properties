# SonarQube Project Configuration
sonar.projectKey=ehk-web
sonar.projectName=EHK Web Application
sonar.projectVersion=1.0.0

# Path to source directories
sonar.sources=src

# Encoding of the source code
sonar.sourceEncoding=UTF-8

# Exclude dependencies, build output, and static files from analysis
sonar.exclusions=node_modules/**, .next/**, out/**, dist/**, build/**, public/**, **/*.spec.ts, **/*.test.tsx, **/*.test.ts, **/*.spec.tsx, scratch/**

# TypeScript Configuration
sonar.typescript.tsconfigPath=tsconfig.json

# Local server details (default localhost port)
sonar.host.url=http://localhost:9000
